<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Identity</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header>
        <nav>
            <a href="/">Home</a>
            <a href="/verify">Verify Identity</a>
            <a href="/dashboard">User Dashboard</a>
            <a href="/api-docs">API Docs</a>
        </nav>
    </header>
    <main class="container">
        <h1 class="mt-5">Verify Your Identity</h1>
        <form id="verify-form">
            <div class="mb-3">
                <label for="user_id" class="form-label">User ID</label>
                <input type="text" class="form-control" id="user_id" required>
            </div>
            <div class="mb-3">
                <label for="documents" class="form-label">Documents</label>
                <input type="file" class="form-control" id="documents" multiple required>
            </div>
            <button type="submit" class="btn btn-primary">Submit</button>
        </form>
    </main>
    <footer class="text-center mt-5">
        <p>&copy; 2023 Decentralized Identity Verification Tool</p>
    </footer>
    <script src="/static/js/main.js"></script>
</body>
</html>
